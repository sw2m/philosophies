name: "Promote goal-spec to tech-specs"
description: |
  Reads a `spec:goal` issue, asks Claude to decompose it into N
  tech-spec sub-issues (one technical problem per tech spec, per
  MEMORY.md §VII), and opens each as a `spec:tech` issue with a
  back-link to the parent goal. Posts a summary comment on the goal.

  The agent's job is decomposition, not solution — each tech-spec body
  describes ONE concrete technical problem and what "done" looks like,
  but does not propose code, APIs, or implementation. Phase 3 of the
  tech→PR pipeline is where implementation happens.

inputs:
  issue-number:
    description: "Number of the goal-spec issue to decompose."
    required: true
  owner-login:
    description: "GitHub login of the org-member assignee taking ownership."
    required: true
  anthropic-api-key:
    description: "ANTHROPIC_API_KEY value."
    required: true
  github-token:
    description: "Token used to read the goal issue and create tech-spec issues."
    required: true

runs:
  using: "composite"
  steps:
    - name: Read goal issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        ISSUE_NUMBER: ${{ inputs.issue-number }}
      run: |
        set -euo pipefail
        gh issue view "$ISSUE_NUMBER" --json title,body,labels,number,url > goal.json
        jq -r '.title' goal.json > goal-title.txt
        jq -r '.body'  goal.json > goal-body.txt
        echo "goal title: $(cat goal-title.txt)"
        echo "goal body bytes: $(wc -c < goal-body.txt)"

    - name: Read orchestrator canonical tuple (#128)
      id: cardinality
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        ISSUE: ${{ inputs.issue-number }}
      run: |
        set -euo pipefail
        # Find the chronologically-last orchestrator-authored Phase 1c
        # comment with verdict: pass. Extract subjects/outcomes from its
        # frontmatter as the canonical tuple. Absence of this comment is
        # non-fatal — fall back to the LLM's existing decomposition logic.
        if [ -z "${REPO:-}" ] || [ -z "${ISSUE:-}" ]; then
          echo "min-cardinality=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        comments=$(gh api -H "Accept: application/vnd.github+json" \
          "repos/${REPO}/issues/${ISSUE}/comments?per_page=100" 2>/dev/null || echo '[]')
        latest=$(jq -r '
          [.[]
            | select(.user.login == "github-actions[bot]")
            | select(.body | test("<!-- vsdd-phase-1c[\\s\\S]*reviewer:\\s*orchestrator[\\s\\S]*verdict:\\s*pass[\\s\\S]*-->"))
          ]
          | sort_by(.created_at)
          | last
        ' <<<"$comments")
        if [ "$latest" = "null" ] || [ -z "$latest" ]; then
          echo "::notice::No orchestrator pass comment found; falling back to default decomposition."
          echo "min-cardinality=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        body=$(jq -r '.body' <<<"$latest")
        subjects=$(printf '%s\n' "$body" | sed -n 's/^subjects:\s*\([0-9]\+\)\s*$/\1/p' | head -1)
        outcomes=$(printf '%s\n' "$body" | sed -n 's/^outcomes:\s*\([0-9]\+\)\s*$/\1/p' | head -1)
        if [ -z "$subjects" ] || [ -z "$outcomes" ]; then
          echo "min-cardinality=" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ "$subjects" -lt "$outcomes" ]; then
          min=$subjects
        else
          min=$outcomes
        fi
        echo "min-cardinality=$min" >> "$GITHUB_OUTPUT"
        echo "Canonical tuple: subjects=${subjects}, outcomes=${outcomes}, min=${min}"

    - name: Build agent prompt
      shell: bash
      env:
        MIN_CARDINALITY: ${{ steps.cardinality.outputs.min-cardinality }}
      run: |
        set -euo pipefail
        cat > stdin.txt <<'PROMPT_EOF'
        # CRITICAL OUTPUT FORMAT (read this FIRST)

        Your response MUST start with YAML frontmatter on the very first
        line — no preamble, no leading whitespace. The frontmatter has
        exactly one key, `tech_specs`, whose value is a list. Each entry
        has `title` and `body`. After the closing `---` you may write a
        free-form summary; the parser ignores it.

        Concrete example of an acceptable response:

        ```
        ---
        tech_specs:
          - title: "[tech] Add ownership-gate job to pr-review.yml"
            body: |
              **Problem.** pr-review.yml currently runs Phase 3 review on every
              non-draft PR regardless of who opened it. External-contributor
              PRs consume agent budget without ownership.

              **Done when.** A new `ownership` job runs first; downstream
              jobs `needs: [ownership]` and skip when no org-member author
              or assignee is present.

              **Section reference.** §I (Adversary), §II Phase 3.
          - title: "[tech] ..."
            body: |
              ...
        ---

        (free-form summary may follow, ignored by the parser)
        ```

        # TASK

        You are decomposing a goal-spec issue into tech-spec sub-issues
        per MEMORY.md §VII (Spec Discipline).

        Rules:
        - One technical problem per tech-spec. No bundling. If the goal
          has N distinct technical problems, output N tech-specs.
        - Tech-spec bodies describe **what** is broken/missing and **what
          "done" looks like** — not the implementation. Do NOT propose
          code, APIs, function names, or design. Phase 3 of the tech→PR
          pipeline does the implementation.
        - Each tech-spec title must be self-explanatory (≤60 chars).
        - If the goal-spec is already a single technical problem, output
          one tech-spec.
        - If the goal-spec is too vague to decompose, output zero
          tech-specs and explain in the free-form summary; the human
          will refine the goal first.

        Inputs are EMBEDDED below — do not look for files on disk.
        Cite only what is in the embedded text.

        --- MEMORY.md ---
        PROMPT_EOF
        cat MEMORY.md >> stdin.txt
        # Per #128: when the orchestrator emitted a canonical tuple with
        # min == 1, append a hard constraint to the prompt so the LLM
        # emits exactly one tech-spec (matching the goal's atomic shape).
        if [ "${MIN_CARDINALITY:-}" = "1" ]; then
          cat >> stdin.txt <<'CARD_EOF'

        --- CARDINALITY CONSTRAINT (per #128) ---

        The Phase 1c cardinality orchestrator determined this goal is at
        single-tech-spec granularity (`min(subjects, outcomes) == 1`). You
        MUST emit exactly ONE tech-spec covering the whole goal. Do not
        decompose into multiple siblings — the goal's shape is atomic;
        any decomposition would split coupled work that is only meaningful
        together.
        CARD_EOF
        fi
        {
          printf '\n--- GOAL ISSUE TITLE ---\n'
          cat goal-title.txt
          printf '\n--- GOAL ISSUE BODY ---\n'
          cat goal-body.txt
        } >> stdin.txt
        echo "stdin.txt bytes: $(wc -c < stdin.txt)"

    - name: Run Claude (org-member gate inside)
      uses: ./.github/actions/agents/claude
      with:
        api-key: ${{ inputs.anthropic-api-key }}
        actor-override: ${{ inputs.owner-login }}
        stdin-file: stdin.txt
        output-file: tech-specs.md

    - name: Parse tech-specs and open sub-issues
      uses: ./.github/actions/script/github-deno
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fm = await import("./.github/scripts/vsdd/frontmatter.ts");
          const issueNumber = ${{ inputs.issue-number }};
          const owner = "${{ inputs.owner-login }}";
          const [repoOwner, repoName] = "${{ github.repository }}".split("/");

          const raw = await Deno.readTextFile("tech-specs.md");

          // Find the vsdd-decompose block. The agent emits it at the top
          // of its response; subsequent prose is summary text.
          let payload = null;
          let summary = raw.trim();
          for (const block of fm.parse(raw)) {
            if (typeof block !== "object" || block === null || Array.isArray(block)) continue;
            const inner = (block as Record<string, unknown>)["vsdd-decompose"];
            if (typeof inner !== "object" || inner === null || Array.isArray(inner)) continue;
            payload = inner as { tech_specs?: unknown };
            break;
          }
          if (!payload || !Array.isArray(payload.tech_specs)) {
            console.error("::error::Could not extract `tech_specs` list from agent output.");
            console.error("--- raw ---");
            console.error(raw);
            core.setFailed("tech_specs extraction failed");
            return;
          }

          // After the closing -->, summary is whatever the agent appended.
          const closeIdx = raw.indexOf("-->");
          if (closeIdx !== -1) summary = raw.slice(closeIdx + 3).trim();

          const opened = [];
          for (const spec of payload.tech_specs as Array<Record<string, unknown>>) {
            if (typeof spec !== "object" || spec === null || !("title" in spec) || !("body" in spec)) {
              console.log(`  skip malformed: ${JSON.stringify(spec)}`);
              continue;
            }
            const title = String(spec.title).trim();
            const body = String(spec.body).trim();
            const footer =
              `\n\n---\n` +
              `_Tech-spec sub-issue of #${issueNumber} (goal). Opened by ` +
              "`promote-goal-to-tech` after @" + owner + " self-assigned the goal._\n" +
              "_Assign yourself to this issue to start the 5-phase tech→PR pipeline._\n";
            let r;
            try {
              r = await github.rest.issues.create({
                owner: repoOwner, repo: repoName,
                title, body: body + footer, labels: ["spec:tech"],
              });
            } catch {
              // Label may be missing on a downstream repo. Retry without.
              r = await github.rest.issues.create({
                owner: repoOwner, repo: repoName,
                title, body: body + footer,
              });
            }
            const url = r.data.html_url;
            console.log(`  opened: ${url}`);
            opened.push({ title, url });
          }

          // Comment on the parent goal with the list of children.
          let bodyLines: string[];
          if (opened.length > 0) {
            bodyLines = [
              `**Goal decomposed into ${opened.length} tech-spec sub-issue(s).**`,
              `_Triggered by @${owner} self-assigning this goal._`,
              "",
            ];
            for (const { title, url } of opened) {
              bodyLines.push(`- ${url} — ${title}`);
            }
            bodyLines.push(
              "",
              "Each sub-issue carries `spec:tech`. Assign yourself to a " +
              "tech-spec to start the 5-phase implementation pipeline " +
              "(scaffold → tests → Red gate → implement → Green gate).",
            );
          } else {
            bodyLines = [
              `**No tech-specs produced.**`,
              `_Triggered by @${owner} but the agent could not decompose this goal._`,
              "",
              `Free-form rationale from the agent:`,
              "",
              `> ${summary.slice(0, 1500)}`,
              "",
              "Refine the goal-spec body and re-assign to retry, or " +
              "open tech-specs by hand and apply `spec:tech`.",
            ];
          }
          await github.rest.issues.createComment({
            owner: repoOwner, repo: repoName,
            issue_number: issueNumber,
            body: bodyLines.join("\n"),
          });
