name: "Resolve git content"
description: |
  Resolves any ref-like input (branch, tag, SHA, PR shorthand #N, range A...B)
  plus optional path whitelist into one of three output forms: diff, directory,
  or tarball. Works on shallow checkouts by falling back to GitHub API.

  See sw2m/philosophies#158 for the full tech-spec.

inputs:
  ref:
    description: |
      The ref-like to resolve. Supports:
      - Bare commit SHA (40-hex or 7+-hex prefix)
      - Branch name
      - Tag name (tag/branch collision: tags win)
      - Fully-qualified ref (refs/heads/<name> or refs/tags/<name>)
      - PR-shorthand #N (expands to base...head range)
      - Range <X>...<Y> (three-dot; each side resolves independently)
      - Empty: resolves to default branch HEAD
    required: false
    default: ""
  whitelist-paths:
    description: |
      Newline-separated path globs for filtering. Empty means no filtering
      (all paths pass through). Supports shell-style globs via picomatch.
      Comments (#) and blank lines are ignored. Negation (!) is rejected.
    required: false
    default: ""
  output-format:
    description: "Output format: diff, directory, or tarball."
    required: true
  pr-shorthand-base:
    description: "Repo to resolve #N PR-shorthand against."
    required: false
    default: ${{ github.repository }}
  github-token:
    description: "Token for gh api calls."
    required: false
    default: ${{ github.token }}

outputs:
  output-path:
    description: "Absolute path to the produced artifact."
    value: ${{ steps.resolve.outputs.output-path }}
  resolved-ref:
    description: "For single-ref inputs, the resolved SHA; for ranges, <base-sha>...<head-sha>."
    value: ${{ steps.resolve.outputs.resolved-ref }}
  file-count:
    description: "Number of leaf entries in the output after path filtering."
    value: ${{ steps.resolve.outputs.file-count }}

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install picomatch
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        if [ ! -d node_modules/picomatch ]; then
          npm install --no-save picomatch
        fi

    - name: Resolve git content
      id: resolve
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_REF: ${{ inputs.ref }}
        INPUT_WHITELIST: ${{ inputs.whitelist-paths }}
        INPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_PR_BASE: ${{ inputs.pr-shorthand-base }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        cd "${{ github.action_path }}"
        node cli.js resolve "$INPUT_REF" "$INPUT_WHITELIST" "$INPUT_FORMAT" "$INPUT_PR_BASE" "$RUNNER_TEMP/git-resolve"
