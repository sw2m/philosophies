name: 'github-script-deno'
description: |
  Deno-based equivalent of actions/github-script. Runs a TypeScript/JavaScript
  script with `github` (authenticated Octokit), `context` (GitHub event
  context), and `core` (`@actions/core`) injected. Top-level `await` is
  supported. Prerequisite for #169 (unify .github/scripts/ to Deno).

inputs:
  script:
    description: 'TypeScript/JavaScript code to run. `github`, `context`, `core` are in scope.'
    required: true
  github-token:
    description: 'Token for the injected Octokit. Defaults to the workflow GITHUB_TOKEN.'
    required: false
    default: ${{ github.token }}
  deno-version:
    description: 'Deno version to install via setup-deno. Defaults to the latest 2.x.'
    required: false
    default: 'v2.x'

outputs:
  result:
    description: 'Stringified return value of the user script (string passthrough; non-strings are JSON-encoded). Empty when the script returns undefined.'
    value: ${{ steps.run.outputs.result }}

runs:
  using: composite
  steps:
    - uses: denoland/setup-deno@v2
      with:
        deno-version: ${{ inputs.deno-version }}

    - id: run
      shell: bash
      env:
        INPUT_SCRIPT: ${{ inputs.script }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        # Write the user's script to a tempfile rather than passing it via CLI
        # args — keeps shell quoting from mangling embedded quotes/newlines/backticks.
        SCRIPT_FILE="$RUNNER_TEMP/github-script-deno-input.txt"
        printf '%s' "$INPUT_SCRIPT" > "$SCRIPT_FILE"

        # Permission surface mirrors actions/github-script's effective access
        # (Node has no permission model). Future work can scope this tighter
        # via per-call inputs.
        deno run \
          --allow-env \
          --allow-net \
          --allow-read \
          --allow-write="$RUNNER_TEMP" \
          "${{ github.action_path }}/runner.ts" \
          "$SCRIPT_FILE"
