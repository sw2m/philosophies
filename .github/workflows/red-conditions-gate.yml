name: VSDD Red-conditions Gate

# §VIII Red Gate enforcement for non-promote-pipeline PRs (#54). Three
# chained clauses, each gating the next so cheap checks fail fast and
# the agent budget for the LLM coverage judgment isn't burned on PRs
# that already failed the structural gates (#61):
#
#   (a) test-commits-only — every commit on this PR so far classifies
#       as test-only via .github/scripts/classify-changes.sh (#60).
#   (b) test-runner-red — the new tests fail without the implementation.
#       (Deferred: needs the impl-revert mechanism from #54's tech-spec
#       set. For now, a stub that runs the suite and reports red/green
#       per current state — sufficient signal until the revert mechanism
#       lands.)
#   (c) coverage-adequate — an LLM (Claude or Gemini) judges the test
#       set adequately covers the linked tech-spec issue body. Deferred
#       (see the action implementation below).
#
# When all three clauses pass, the workflow posts a marker comment by
# `github-actions[bot]` of the form `✓ VSDD Red gate cleared at <SHA>`
# (#62's marker contract). Subsequent non-test commits ancestor-checking
# (#63) uses this marker as the cleared-from anchor.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call: {}

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  shape:
    name: Detect repo shape
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    outputs:
      has-tests: ${{ steps.s.outputs.has-tests }}
    steps:
      - uses: actions/checkout@v6
      - id: s
        uses: sw2m/philosophies/.github/actions/repo-shape@main

  red-conditions:
    name: Red-conditions gate (3-clause)
    needs: [shape]
    # Docs repos: §VIII N/A, exit successfully without posting a marker.
    if: ${{ github.event.pull_request.draft != true && needs.shape.outputs.has-tests == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      # Clause (a) — test-commits-only.
      # Walk every commit on the PR; each must classify as tests-only.
      # `classify-changes` returns `tests-only=true|false` per commit.
      - name: Clause (a) — test-commits-only
        id: clause-a
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          GLOBS: ${{ vars.VSDD_TEST_GLOBS }}
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin "$BASE_REF" --no-tags
          # Walk each commit between BASE and HEAD (exclusive).
          fail=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            output=$(bash .github/scripts/classify-changes.sh "$sha" \
              ${GLOBS:+--patterns "$GLOBS"})
            tests_only=$(grep '^tests-only=' <<<"$output" | cut -d= -f2)
            if [ "$tests_only" != "true" ]; then
              echo "::error::commit $sha contains non-test changes."
              echo "$output" | sed 's/^/    /'
              fail=1
            fi
          done < <(git rev-list "$BASE_SHA".."$HEAD_SHA")
          if [ "$fail" = "1" ]; then
            echo "tests-only-pr=false" >> "$GITHUB_OUTPUT"
            echo "::error::Clause (a) failed: PR contains non-test commits. Push test commits first; non-test commits land only after the marker is posted."
            exit 1
          fi
          echo "tests-only-pr=true" >> "$GITHUB_OUTPUT"
          echo "✓ Clause (a) passed: every commit on the PR classifies as test-only."

      # Clause (b) — test-runner-red.
      # FIXME(#54): this should run the test suite WITHOUT the impl
      # changes (impl-revert mechanism) and assert new tests fail. For
      # now, a stub that runs the suite as-is and reports the result;
      # the revert-aware version is its own tech-spec on #54's
      # decomposition.
      - name: Clause (b) — test-runner-red (stub)
        id: clause-b
        if: steps.clause-a.outputs.tests-only-pr == 'true'
        shell: bash
        run: |
          echo "::notice::Clause (b) is a stub pending #54's impl-revert mechanism. Treating as PASS for now."
          echo "red-ok=true" >> "$GITHUB_OUTPUT"

      # Clause (c) — coverage-adequate.
      # FIXME(#54): an LLM judges the test set against the linked spec
      # body. Deferred — needs the linked-issue body fetch + agent invo.
      # Both pieces exist (pr-review.yml does fetch-and-embed; the
      # gemini composite action invokes the agent) but composing them
      # is its own tech-spec. Treating as PASS until that lands.
      - name: Clause (c) — coverage-adequate (stub)
        id: clause-c
        if: steps.clause-b.outputs.red-ok == 'true'
        shell: bash
        run: |
          echo "::notice::Clause (c) is a stub pending agent-coverage-judgment tech-spec. Treating as PASS for now."
          echo "coverage-ok=true" >> "$GITHUB_OUTPUT"

      # All three clauses passed → post the bot marker. The marker is the
      # property contract of #62: a per-PR `github-actions[bot]` comment
      # that downstream non-test-blocker CI (#63) can detect via
      # `gh api repos/.../issues/<N>/comments` filtering.
      - name: Post Red-gate-cleared marker
        if: steps.clause-c.outputs.coverage-ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          # Idempotency: only post if no existing marker matches HEAD.
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR}/comments" \
            --jq ".[] | select(.user.login == \"github-actions[bot]\") | select(.body | startswith(\"✓ VSDD Red gate cleared at $HEAD_SHA\"))" \
            | head -c1) || true
          if [ -n "$existing" ]; then
            echo "Marker already posted for $HEAD_SHA; skipping."
            exit 0
          fi
          gh pr comment "$PR" --body "✓ VSDD Red gate cleared at $HEAD_SHA. Non-test commits descending from this SHA are permitted."
          echo "Posted Red-gate-cleared marker for $HEAD_SHA."
