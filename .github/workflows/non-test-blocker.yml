name: VSDD Non-test-blocker (ancestry enforcement)

# Per #129/#126: this workflow is decommissioned as a merge gate. The
# Red-gate-cleared marker is now a one-way diode comment with a fixed
# token (no SHA payload), and the divergence/whitelist signal lives in
# the `vsdd:opt-out` brand label maintained by `vsdd-brand.yml`. The
# job below runs purely to keep the named required check on main's
# branch protection green while the protection rule is updated to drop
# this check from its list. It always exits 0; consumers should look
# at the brand label or `vsdd-marker-check.yml`'s output instead.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call: {}

permissions:
  contents: read
  pull-requests: read

jobs:
  blocker:
    name: Non-test-commit ancestry enforcement
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Decommissioned — always success
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        shell: bash
        run: |
          set -euo pipefail
          # Per #129: detect marker presence by author + token, no SHA
          # extraction, no commit-shape walk. Result is informational —
          # we always exit 0 regardless.
          marker_present=false
          if gh api --paginate "repos/${{ github.repository }}/issues/${PR}/comments" \
              --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("<!-- vsdd-red-gate-cleared -->"))' \
              2>/dev/null \
              | head -c1 | grep -q .; then
            marker_present=true
          fi
          {
            echo "## VSDD Non-test-blocker (decommissioned)"
            echo ""
            echo "- This check no longer enforces commit-shape rules."
            echo "- Marker present on PR: \`$marker_present\`"
            echo "- VSDD opt-out signal: see the \`vsdd:opt-out\` label (maintained by \`vsdd-brand.yml\`)."
            echo "- Per #129: marker is a fixed token, one-way diode, no SHA payload, no ancestry walk."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Non-test-blocker decommissioned per #129. marker_present=$marker_present. Exiting 0."
