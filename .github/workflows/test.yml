name: VSDD Testing CI

# Gating workflow — branch protection on main requires this to pass.
# Markdown lint, link check, and a structural sanity check on MEMORY.md.
on:
  push:
    branches: [main]
  pull_request:
    # `ready_for_review` so jobs run when a draft is promoted. Drafts are
    # skipped at job level via the `if: ... draft != true` guard below.
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call: {}

permissions:
  contents: read

# Skip every job on draft PRs — applies uniformly via this anchor that each
# job references. Push and workflow_call events are unaffected because
# `github.event.pull_request.draft` is undefined there (≠ true).
jobs:
  markdownlint:
    name: Markdown lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  linkcheck:
    name: External link check (lychee)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --exclude json-schema.org
            --exclude spec.openapis.org
            MEMORY.md
          fail: true

  structural-sanity:
    name: MEMORY.md structural sanity
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assert all 9 numbered sections are present
        run: bash .github/scripts/check-memory-structure.sh

  green-gate:
    name: Green Gate (§VIII tests on PR HEAD)
    # §VIII Green Gate enforcement on human-authored PRs (#42). Docs
    # repos (no detected test runner) succeed with a "§VIII N/A" notice
    # so branch protection gets a definitive PASS rather than SKIPPED.
    # Red Gate (tests-failing-before-impl) is NOT enforced here — that
    # would require reverting only the implementation hunks, brittle on
    # human commit histories. Humans are trusted to have followed
    # Red→Green discipline locally; the agent-driven path
    # (promote-tech-to-pr) is the only fully-automated 4-Result chain.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: shape
        uses: ./.github/actions/repo-shape
      - name: Run tests if a runner is present
        env:
          HAS_TESTS: ${{ steps.shape.outputs.has-tests }}
        shell: bash
        run: |
          set -euo pipefail
          if [ "$HAS_TESTS" != "true" ]; then
            echo "::notice::§VIII N/A (no test runner detected by repo-shape). Green Gate trivially satisfied."
            echo "- Green Gate: **N/A** (no test runner detected)" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # First match wins. Same detection promote-tech-to-pr uses.
          if [ -f Makefile ] && grep -qE '^test:' Makefile; then
            CMD="make test"
          elif [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            if [ -f bun.lockb ] || [ -f bun.lock ]; then CMD="bun test"; else CMD="npm test"; fi
          elif [ -f deno.json ] || [ -f deno.jsonc ]; then
            CMD="deno test -A"
          elif [ -f pyproject.toml ] || [ -f pytest.ini ] || [ -f setup.py ]; then
            CMD="pytest"
          elif [ -f Cargo.toml ]; then
            CMD="cargo test"
          elif [ -f go.mod ]; then
            CMD="go test ./..."
          else
            echo "::error::repo-shape says has-tests=true but no recognized runner. Add a Makefile \`test:\` target, package.json \`test\` script, deno task, pytest config, Cargo.toml, or go.mod."
            exit 1
          fi
          echo "Running Green Gate: $CMD"
          echo "- Green Gate command: \`$CMD\`" >> "$GITHUB_STEP_SUMMARY"
          eval "$CMD"
          echo "- Green Gate: **PASS**" >> "$GITHUB_STEP_SUMMARY"

  issue-linkage:
    name: PR body links a spec issue
    # Gating per #30: every PR must reference a tracked issue with a
    # GitHub closing keyword (Closes / Fixes / Resolves + #N), so the
    # spec that survived Phase 1c is the contract the PR satisfies.
    # Pull-request only — push / workflow_call have no PR body to check.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Assert PR body has Closes/Fixes/Resolves #N
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR body is empty. Add a closing keyword + issue number, e.g. \`Closes #42\`."
            exit 1
          fi
          # Match GitHub's auto-close keywords (case-insensitive). Tense
          # variants (closed/closes/fixed/fixes/resolved/resolves) and
          # `#N` are required adjacent — `Resolves: #42` is fine, bare
          # `#42` is not (per #30, the PR must declare which spec it
          # closes, not just mention one in passing).
          if grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)[: ]+#[0-9]+' <<<"$PR_BODY" >/dev/null; then
            echo "✓ PR body links a spec issue."
            grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)[: ]+#[0-9]+' <<<"$PR_BODY" | head -5
            exit 0
          fi
          echo "::error::PR body does not link a spec issue with a closing keyword."
          echo "::error::Add e.g. \`Closes #42\` so the spec that survived Phase 1c"
          echo "::error::is recorded as the contract this PR satisfies (§II Phase 3)."
          exit 1
