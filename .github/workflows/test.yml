name: VSDD Testing CI

# Gating workflow — branch protection on main requires this to pass.
# Markdown lint, link check, and a structural sanity check on MEMORY.md.
on:
  push:
    branches: [main]
  pull_request:
    # `ready_for_review` so jobs run when a draft is promoted. Drafts are
    # skipped at job level via the `if: ... draft != true` guard below.
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_call: {}

permissions:
  contents: read

# Skip every job on draft PRs — applies uniformly via this anchor that each
# job references. Push and workflow_call events are unaffected because
# `github.event.pull_request.draft` is undefined there (≠ true).
jobs:
  markdownlint:
    name: Markdown lint
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: "**/*.md"

  linkcheck:
    name: External link check (lychee)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --max-concurrency 4
            --exclude json-schema.org
            --exclude spec.openapis.org
            MEMORY.md
          fail: true

  structural-sanity:
    name: MEMORY.md structural sanity
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assert all 9 numbered sections are present
        run: bash .github/scripts/check-memory-structure.sh

  green-gate:
    name: Green Gate (§VIII tests on PR HEAD)
    # §VIII Green Gate enforcement on human-authored PRs (#42). Docs
    # repos (no detected test runner) succeed with a "§VIII N/A" notice
    # so branch protection gets a definitive PASS rather than SKIPPED.
    # Red Gate (tests-failing-before-impl) is NOT enforced here — that
    # would require reverting only the implementation hunks, brittle on
    # human commit histories. Humans are trusted to have followed
    # Red→Green discipline locally; the agent-driven path
    # (promote-tech-to-pr) is the only fully-automated 4-Result chain.
    if: github.event_name != 'pull_request' || github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - id: shape
        uses: ./.github/actions/repo-shape
      - name: Detect runner + emit install/test commands
        id: runner
        env:
          HAS_TESTS: ${{ steps.shape.outputs.has-tests }}
        shell: bash
        run: |
          set -euo pipefail
          # Coarse "no runner detected at all" → trivially N/A.
          if [ "$HAS_TESTS" != "true" ]; then
            echo "::notice::§VIII N/A (repo-shape says no test runner)."
            echo "- Green Gate: **N/A** (no test runner detected)" >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # repo-shape returns has-tests=true on permissive markers like
          # "package.json exists" or "tests/ directory exists". That's
          # NOT the same as "an actual test command is configured".
          # Discover a real runner; if none is configured, treat as N/A
          # (a docs-shaped repo that happens to have package.json for
          # tooling, e.g., markdownlint-cli config). Per Gemini's
          # adversarial review on this PR, the prior fall-through-to-
          # error was wrong: many repos are valid `has-tests=true`
          # without a runnable test command.
          INSTALL=""
          CMD=""
          NODE=""
          PY=""
          if [ -f Makefile ] && grep -qE '^test:' Makefile; then
            CMD="make test"
          elif [ -f package.json ] && jq -e '.scripts.test' package.json >/dev/null 2>&1; then
            NODE="20"
            if [ -f bun.lockb ] || [ -f bun.lock ]; then
              # Bun manages its own deps; install via bun directly.
              INSTALL="bun install --frozen-lockfile"; CMD="bun test"
            elif [ -f package-lock.json ]; then
              INSTALL="npm ci"; CMD="npm test"
            elif [ -f yarn.lock ]; then
              INSTALL="corepack enable && yarn install --frozen-lockfile"; CMD="yarn test"
            elif [ -f pnpm-lock.yaml ]; then
              INSTALL="corepack enable && pnpm install --frozen-lockfile"; CMD="pnpm test"
            else
              # No lockfile — fall back to npm install. Less reproducible
              # but at least functional; the repo should add a lockfile.
              INSTALL="npm install"; CMD="npm test"
            fi
          elif [ -f deno.json ] || [ -f deno.jsonc ]; then
            # Deno fetches deps on demand; nothing to install up front.
            CMD="deno test -A"
          elif [ -f pyproject.toml ] || [ -f pytest.ini ] || [ -f setup.py ]; then
            PY="3.x"
            # Best-effort install: editable install if pyproject/setup.py;
            # otherwise pull pytest only.
            if [ -f pyproject.toml ] || [ -f setup.py ]; then
              INSTALL="python -m pip install --upgrade pip && python -m pip install -e ."
            else
              INSTALL="python -m pip install --upgrade pip pytest"
            fi
            CMD="pytest"
          elif [ -f Cargo.toml ]; then
            # cargo test handles its own dep resolution.
            CMD="cargo test"
          elif [ -f go.mod ]; then
            INSTALL="go mod download"; CMD="go test ./..."
          else
            echo "::notice::§VIII N/A (no recognized runner — repo-shape was permissive but no Make/npm/bun/yarn/pnpm/deno/pytest/cargo/go target was found)."
            echo "- Green Gate: **N/A** (no recognized runner configured)" >> "$GITHUB_STEP_SUMMARY"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Surface what we picked so the downstream steps can act on it
          # AND so the human reading the run summary can audit the choice.
          echo "skip=false"          >> "$GITHUB_OUTPUT"
          echo "install=$INSTALL"    >> "$GITHUB_OUTPUT"
          echo "cmd=$CMD"            >> "$GITHUB_OUTPUT"
          echo "node=$NODE"          >> "$GITHUB_OUTPUT"
          echo "py=$PY"              >> "$GITHUB_OUTPUT"
          {
            echo "- Green Gate runner: \`$CMD\`"
            [ -n "$INSTALL" ] && echo "- Install step: \`$INSTALL\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up Node
        if: steps.runner.outputs.node != ''
        uses: actions/setup-node@v6
        with:
          node-version: ${{ steps.runner.outputs.node }}

      - name: Set up Python
        if: steps.runner.outputs.py != ''
        uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.runner.outputs.py }}

      - name: Install dependencies
        if: steps.runner.outputs.skip != 'true' && steps.runner.outputs.install != ''
        shell: bash
        run: ${{ steps.runner.outputs.install }}

      - name: Run Green Gate
        if: steps.runner.outputs.skip != 'true'
        shell: bash
        run: |
          set -euo pipefail
          eval "${{ steps.runner.outputs.cmd }}"
          echo "- Green Gate: **PASS**" >> "$GITHUB_STEP_SUMMARY"

  issue-linkage:
    name: PR body links a spec issue
    # Gating per #30: every PR must reference a tracked issue with a
    # GitHub closing keyword (Closes / Fixes / Resolves + #N), so the
    # spec that survived Phase 1c is the contract the PR satisfies.
    # Pull-request only — push / workflow_call have no PR body to check.
    if: github.event_name == 'pull_request' && github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - name: Assert PR body has Closes/Fixes/Resolves #N
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${PR_BODY:-}" ]; then
            echo "::error::PR body is empty. Add a closing keyword + issue number, e.g. \`Closes #42\`."
            exit 1
          fi
          # Match GitHub's auto-close keywords (case-insensitive). Tense
          # variants (closed/closes/fixed/fixes/resolved/resolves) and
          # `#N` are required adjacent — `Resolves: #42` is fine, bare
          # `#42` is not (per #30, the PR must declare which spec it
          # closes, not just mention one in passing).
          if grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)[: ]+#[0-9]+' <<<"$PR_BODY" >/dev/null; then
            echo "✓ PR body links a spec issue."
            grep -oiE '\b(close[sd]?|fix(e[sd])?|resolve[sd]?)[: ]+#[0-9]+' <<<"$PR_BODY" | head -5
            exit 0
          fi
          echo "::error::PR body does not link a spec issue with a closing keyword."
          echo "::error::Add e.g. \`Closes #42\` so the spec that survived Phase 1c"
          echo "::error::is recorded as the contract this PR satisfies (§II Phase 3)."
          exit 1
