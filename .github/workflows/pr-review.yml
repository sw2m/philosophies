name: VSDD Pull Request Review (Phase 3)

# Advisory only — never gates the merge. Two adversarial reviewers run in
# parallel for cognitive diversity (MEMORY.md §V): Gemini and Claude. Each
# posts its findings as a PR comment. Org-membership is enforced inside the
# composite actions.

on:
  pull_request:
    # `ready_for_review` is added so jobs run when a draft is promoted to
    # ready. Drafts themselves are skipped at job level via the
    # `if: github.event.pull_request.draft != true` guard below.
    # `assigned` re-fires the workflow when an org member self-assigns to
    # an externally-authored PR (the assignment IS the ownership signal —
    # see the `ownership` job below).
    types: [opened, synchronize, reopened, ready_for_review, assigned]
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

# Single source of truth for the Phase 3 review prompt content. Both the
# Gemini stdin builder (in `prep`) and the Claude `prompt:` input (in
# `claude-review`) interpolate these via ${{ env.* }} so the review rules
# and output-format spec live in exactly one place. Reviewer-specific
# framing (gemini's stdin intro, claude's anti-hallucination guard) stays
# inline at the call site.
env:
  # Single source of truth for the Phase 3 reviewer prompt. Both reviewers
  # (Gemini, Claude) receive this identical text — the only mechanical
  # difference is HOW the input substrate (MEMORY.md + repo tree + diff)
  # is attached: Gemini reads it via stdin; Claude's composite action
  # prepends this prompt to the same stdin-file. Adding a new review
  # rule means editing this one block.
  PHASE_3_PROMPT: |-
    # CRITICAL OUTPUT FORMAT (read this FIRST)

    Your response MUST start, on the very first line, with exactly `---` (no leading whitespace, no preamble), then `verdict: pass` or `verdict: fail`, then `---`, then your bullet list.

    Acceptable response example:

    ```
    ---
    verdict: fail
    ---

    - **(blocking)** path/to/file.ts:42 — Bug description. Fix: …
    - path/to/other.ts:10 — Nitpick. Fix: …
    ```

    If you do not produce frontmatter as your first output, the workflow
    will fail and your review will be discarded. Non-negotiable.

    # TASK

    You are an adversarial Phase 3 reviewer (MEMORY.md §II — Verified Spec-Driven Development / VSDD).

    The canonical VSDD doc, the PR body and any linked tech-spec issues (in `<pr-context>` and `<linked-issue n="N">` tags), the full repo file tree (in `<file path="...">` tags, with `truncated="true"` markers when a file exceeds the per-file or total budget), and the PR diff under review are EMBEDDED below in the same message — do not look for files on disk; if you cite something, cite from the embedded content. For spec-fidelity findings (whether the diff matches the spec it's supposed to satisfy), cite from the linked-issue or pr-context content. The repo-tree section gives you context for WHERE the diff fits; the diff gives you WHAT changed.

    Critical: if you find yourself citing a file or symbol that isn't actually present in the embedded content, STOP — that is a hallucination. You may cite content from `<file>` blocks AND from the diff.

    # DIFF-TRUNCATION CHECK

    If you see `[diff truncated to 5000 lines]` anywhere in the embedded diff, START your review's body (after the frontmatter) with this exact bullet:

    `- **(blocking) DIFF TRUNCATED.** This review only saw the first 5000 lines of the diff. The human reviewer must read the rest of the diff manually before merging.`

    That bullet must appear before any other findings. Set `verdict: fail` because partial coverage is a correctness concern. This rule overrides the usual pass-with-nitpicks logic.

    Apply these review rules. Look ONLY for:

    - Code that diverges from the spec it's supposed to satisfy
    - Tautological tests
    - Hidden coupling, race conditions, missing cleanup
    - Multi-word symbols (camelCase / snake_case), per §IX:
      - Functions/methods: should they be `Subject.verb` on a state machine?
      - Vars at large: is the symbol genuinely ambiguous, or is it verbose-when-unambiguous? `archiveUrl` reduces to `archive` or `url`.
      - Localized/scoped collisions: if multi-word is forced by collision, the scope is doing too much.
      - Do NOT flag: PascalCase types/classes/interfaces; serde-leak fields whose name matches an at-rest schema (`c_type` matching a YAML/JSON field); external-library symbols you don't control.
    - Error-structure inconsistency (§IX): mixed error types, mixed throw/return/null, partial error-code coverage, try/catch vs assertThrows mismatches.
    - Inconsistent error handling
    - Spec-discipline violations: tech-spec issues bundling >1 problem (§VII)
    - Security Surface (§II Phase 3): input validation gaps, injection vectors (SQL/command/path), unsafe deserialization, missing auth/authz checks
    - Spec gaps revealed by implementation (§II Phase 3): behavior in the diff that the spec doesn't cover
    - Purity-boundary violations (§II Phase 5): newly-introduced side effects (I/O, mutable globals, time/random reads, network calls) inside a function or module the spec marks as a pure core. Flag any new dependency from a pure unit on impure infrastructure.

    # OUTPUT FORMAT (strict)

    Begin your response with YAML frontmatter, exactly this shape:

    ---
    verdict: pass | fail
    ---

    The verdict answers "should this PR be approved?", **not** "are
    there zero concerns?". A `pass` with listed nitpicks is correct
    and expected — concerns can exist without blocking.

    - `verdict: pass` ⇔ concerns are nits/style/nice-to-have. The PR
      is acceptable as-is; the human can address the nits or dismiss
      them. Translates to APPROVE.
    - `verdict: fail` ⇔ at least one concern is genuinely blocking
      (correctness, security, broken contract, spec violation that
      invalidates the change). Translates to REQUEST_CHANGES.

    The frontmatter MUST be the first thing in your output (no leading
    whitespace, no preamble).

    After the closing `---`, list every concern (blocking and
    nitpicks alike) as terse bullets. Each bullet: a concrete flaw
    with `file:line` and a proposed fix. Mark blocking concerns
    explicitly with **(blocking)** at the start of the bullet so the
    human reading can scan for them.

    If you genuinely have nothing to say, the body may be a single
    line.

jobs:
  # Ownership gate. A PR is "owned" when its author is an sw2m org member
  # OR any of its current assignees is. Unowned PRs (e.g. fork PRs from
  # external contributors with no org-member assignee) are dormant — CI
  # skips so an external contributor cannot consume agent budget. To wake
  # an external PR up, an org member assigns themselves; `pull_request:
  # [assigned]` re-fires this workflow and the gate now lets it through.
  ownership:
    name: Verify org-member ownership
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    outputs:
      owned: ${{ steps.check.outputs.owned }}
      owner: ${{ steps.check.outputs.owner }}
      has-gemini-key: ${{ steps.keys.outputs.has-gemini-key }}
      has-anthropic-key: ${{ steps.keys.outputs.has-anthropic-key }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: sw2m
          AUTHOR: ${{ github.event.pull_request.user.login }}
          ASSIGNEES_JSON: ${{ toJson(github.event.pull_request.assignees) }}
        shell: bash
        run: |
          set -euo pipefail
          # NOTE: the default GITHUB_TOKEN can only see PUBLIC org
          # memberships. Members whose membership is private are invisible
          # to this check.
          check_member() {
            local login="$1"
            [ -n "$login" ] && gh api "orgs/$ORG/members/$login" >/dev/null 2>&1
          }
          OWNER=""
          if check_member "$AUTHOR"; then
            OWNER="$AUTHOR"
            echo "Owner: $AUTHOR (PR author, org member)"
          else
            for login in $(jq -r '.[].login' <<< "$ASSIGNEES_JSON"); do
              if check_member "$login"; then
                OWNER="$login"
                echo "Owner: $login (assignee, org member)"
                break
              fi
            done
          fi
          if [ -n "$OWNER" ]; then
            echo "owned=true"  >> "$GITHUB_OUTPUT"
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          else
            echo "owned=false" >> "$GITHUB_OUTPUT"
            echo "owner="      >> "$GITHUB_OUTPUT"
            echo "::notice::PR not owned: author '$AUTHOR' is not an sw2m org member and no assignee is. Phase 3 review skipped. To enable, an org member must self-assign."
          fi
      - id: keys
        # `secrets` is allowed in step env but NOT in job-level `if:`. Surface
        # presence as a job output so reviewer jobs can gate via `needs.*`.
        # (This pattern is what unblocked workflow registration on this file —
        # GitHub silently rejects workflows that reference `secrets` in
        # `jobs.<id>.if`, which previously left this workflow registered with
        # name = file path and not firing on `pull_request` events.)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          [ -n "${GEMINI_API_KEY:-}" ]    && echo "has-gemini-key=true"    >> "$GITHUB_OUTPUT" || echo "has-gemini-key=false"    >> "$GITHUB_OUTPUT"
          [ -n "${ANTHROPIC_API_KEY:-}" ] && echo "has-anthropic-key=true" >> "$GITHUB_OUTPUT" || echo "has-anthropic-key=false" >> "$GITHUB_OUTPUT"

  prep:
    name: Compute PR diff
    needs: [ownership]
    if: ${{ github.event.pull_request.draft != true && needs.ownership.outputs.owned == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Compute diff against base
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Need both BASE_SHA and HEAD_SHA reachable from local history
          # to compute their merge-base. Checkout above uses
          # `fetch-depth: 0` against `ref: HEAD_SHA`, which gets HEAD's
          # full lineage but does NOT pull the base branch separately —
          # if main has commits not in HEAD's lineage, BASE_SHA may not
          # be present. Fetch the base ref by name (full history) so the
          # merge-base lookup succeeds. The earlier `git fetch origin
          # $BASE_SHA --depth=1` was the bug — single-commit shallow
          # fetches don't pull the merge-base ancestor (#58).
          git fetch origin "$BASE_REF" --no-tags
          git diff "$BASE_SHA"..."$HEAD_SHA" > pr.diff
          wc -l pr.diff
          # Truncate by LINES, not bytes — byte truncation can slice mid-line,
          # mid-hunk, or mid-multibyte-character, producing malformed diffs
          # that confuse model parsers.
          if [ "$(wc -l < pr.diff)" -gt 5000 ]; then
            head -n 5000 pr.diff > pr.diff.trunc
            mv pr.diff.trunc pr.diff
            echo "" >> pr.diff
            echo "[diff truncated to 5000 lines]" >> pr.diff
            # Empty marker file so downstream consumers can detect truncation
            # deterministically without grepping the diff body (the marker
            # string itself could legitimately appear inside a diff hunk).
            : > pr.diff.truncated
          fi

      - name: Fetch PR body + linked tech-spec issues
        # Reviewers can't evaluate "Code that diverges from the spec it's
        # supposed to satisfy" (§II Phase 3) from a diff alone — they need
        # the PR body (the change rationale) AND the tech-spec issue body
        # (the contract). Fetch both and emit pr-context.txt for the prompt
        # builder. Linked issues are resolved by parsing Closes/Fixes/
        # Resolves keywords plus bare `#N` references in the PR body.
        # (Refs: issues #3, #10.)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # PR body + title.
          gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json title \
            -q '.title' > pr-title.txt
          gh pr view "$PR_NUMBER" --repo "$GH_REPO" --json body \
            -q '.body' > pr-body.txt

          # Parse issue refs from the PR body. We accept the GitHub linking
          # keywords (Closes/Fixes/Resolves, case-insensitive, with optional
          # past-tense forms) and also bare `#N` references — the spec
          # issue is sometimes mentioned without a keyword (e.g. "see #42").
          # Sort -u to dedupe.
          grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+|#[0-9]+' pr-body.txt \
            | grep -oE '#[0-9]+' \
            | tr -d '#' \
            | sort -u > linked-issues.txt || true

          : > pr-context.txt
          {
            echo '<pr-context>'
            echo "<pr number=\"$PR_NUMBER\">"
            echo '<title>'
            cat pr-title.txt
            echo '</title>'
            echo '<body>'
            cat pr-body.txt
            echo '</body>'
            echo '</pr>'
          } >> pr-context.txt

          if [ -s linked-issues.txt ]; then
            while IFS= read -r issue_num; do
              [ -z "$issue_num" ] && continue
              # Skip self-reference (a PR's own number can match `#N`
              # inside its own body if a human typed it; treat as noise).
              [ "$issue_num" = "$PR_NUMBER" ] && continue
              # `gh issue view` returns non-zero if N is actually a PR or
              # doesn't exist. That's fine — tolerate misses rather than
              # fail the workflow on a stray `#N`.
              if body=$(gh issue view "$issue_num" --repo "$GH_REPO" --json body -q '.body' 2>/dev/null); then
                {
                  echo "<linked-issue n=\"$issue_num\">"
                  printf '%s\n' "$body"
                  echo '</linked-issue>'
                } >> pr-context.txt
              fi
            done < linked-issues.txt
          fi

          echo '</pr-context>' >> pr-context.txt
          wc -l pr-context.txt

      - name: Build repo manifest and embed file contents
        # VSDD §II Phase 3: the verified, test-passing codebase — along with
        # the spec and test suite — is presented to the Adversary. The diff
        # alone hides architectural coupling, purity-boundary violations,
        # and tautological tests that depend on unmodified code. This step
        # emits a manifest of every tracked file plus the contents of each
        # file under PER_FILE_BUDGET, capped at TOTAL_BUDGET total payload.
        env:
          # Per-file cap (bytes). Files larger than this are listed in the
          # manifest but their content is omitted with a `truncated="true"`
          # marker. 50 KiB comfortably covers source files while excluding
          # generated bundles, fixtures, and minified assets.
          PER_FILE_BUDGET: 51200
          # Hard cap on total embedded payload (bytes). Sized to fit
          # comfortably alongside MEMORY.md + diff inside a Claude Sonnet /
          # Gemini Pro context window without crowding the model's response
          # budget. 800 KiB.
          TOTAL_BUDGET: 819200
        run: |
          set -euo pipefail
          : > repo-files.xml
          : > repo-manifest.txt
          total=0
          # Stable ordering — git ls-files is already sorted, but be explicit.
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(wc -c < "$f")
            # Detect binaries via the same heuristic git uses (NUL byte in
            # first 8000 bytes). Skip embedding; list in manifest only.
            if LC_ALL=C grep -qP '\x00' -- "$f" 2>/dev/null; then
              printf '%10d  %s  [binary, omitted]\n' "$size" "$f" >> repo-manifest.txt
              printf '<file path="%s" size="%d" truncated="true" reason="binary"/>\n' "$f" "$size" >> repo-files.xml
              continue
            fi
            if [ "$size" -gt "$PER_FILE_BUDGET" ]; then
              printf '%10d  %s  [oversize, omitted]\n' "$size" "$f" >> repo-manifest.txt
              printf '<file path="%s" size="%d" truncated="true" reason="size"/>\n' "$f" "$size" >> repo-files.xml
              continue
            fi
            if [ $((total + size)) -gt "$TOTAL_BUDGET" ]; then
              printf '%10d  %s  [budget exhausted, omitted]\n' "$size" "$f" >> repo-manifest.txt
              printf '<file path="%s" size="%d" truncated="true" reason="total-budget"/>\n' "$f" "$size" >> repo-files.xml
              continue
            fi
            printf '%10d  %s\n' "$size" "$f" >> repo-manifest.txt
            # CDATA can't contain the literal sequence ']]>'. Split any
            # occurrence across two CDATA sections so the model still sees
            # the original bytes verbatim.
            {
              printf '<file path="%s" size="%d"><![CDATA[\n' "$f" "$size"
              sed 's/]]>/]]]]><![CDATA[>/g' "$f"
              printf ']]></file>\n'
            } >> repo-files.xml
            total=$((total + size))
          done < <(git ls-files)
          echo "embedded payload bytes: $total"
          wc -c repo-files.xml repo-manifest.txt

      - name: Build prompts (gemini + claude)
        run: |
          # Both reviewers receive the same prompt structure: the strict-output
          # preamble first, then role, anti-hallucination guard, review rules,
          # output format spec. The only per-reviewer difference is HOW the
          # content gets embedded — Gemini reads stdin (this file), Claude
          # gets the same file as its `stdin-file` input.
          cat > gemini-stdin.txt <<'PROMPT_EOF'
          ${{ env.PHASE_3_PROMPT }}

          --- MEMORY.md ---
          PROMPT_EOF
          cat MEMORY.md >> gemini-stdin.txt
          {
            printf '\n--- PR + LINKED ISSUE CONTEXT ---\n'
            cat pr-context.txt
            printf '\n--- REPO MANIFEST (every tracked file, sizes in bytes) ---\n'
            cat repo-manifest.txt
            printf '\n--- REPO FILES (full contents where under budget) ---\n'
            cat repo-files.xml
            printf '\n--- PR DIFF ---\n'
            cat pr.diff
          } >> gemini-stdin.txt
          echo "gemini-stdin.txt size:"
          wc -c gemini-stdin.txt

      - uses: actions/upload-artifact@v7
        with:
          name: pr-context
          path: |
            gemini-stdin.txt
            pr.diff
            pr-context.txt
            MEMORY.md
            repo-manifest.txt
            repo-files.xml

  symbol-audit:
    name: §IX symbol audit (advisory)
    needs: [prep]
    # Pure shell-script grep — no agent invocation, no API key needed,
    # so no org-membership gate. Same draft-skipping guard as the
    # adversarial reviews. ALWAYS exits 0 — this is a deterministic
    # pre-check that complements the AI reviewers; it never gates merge.
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: pr-context
          path: ./

      # Fetch philosophies' scripts so this workflow works when called
      # from a downstream sw2m repo via workflow_call (the consumer's
      # checkout has neither symbol-audit.sh nor the other VSDD scripts).
      - name: Fetch sw2m/philosophies scripts
        uses: actions/checkout@v6
        with:
          repository: sw2m/philosophies
          ref: main
          path: .vsdd-philosophies

      - name: Run symbol audit
        run: |
          bash .vsdd-philosophies/.github/scripts/symbol-audit.sh pr.diff symbol-audit.md
          echo '--- symbol-audit.md ---'
          cat symbol-audit.md

      - name: Post symbol-audit comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('symbol-audit.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  gemini-review:
    name: Gemini adversarial review
    needs: [ownership, prep]
    # Skip cleanly when GEMINI_API_KEY isn't available (e.g. fork PR without
    # secret access). Without this guard the composite action would fail
    # noisily, violating the 'advisory only — never gates' contract.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.has-gemini-key == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: pr-context
          path: ./

      # Fetch philosophies' scripts (extract-verdict.js) for downstream
      # callers that don't have them in their checkout.
      - name: Fetch sw2m/philosophies scripts
        uses: actions/checkout@v6
        with:
          repository: sw2m/philosophies
          ref: main
          path: .vsdd-philosophies

      - name: Run Gemini (composite; org-member gate inside)
        uses: sw2m/philosophies/.github/actions/gemini@main
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          stdin-file: gemini-stdin.txt
          output-file: review.md
          # The owner login was identified by the ownership gate. Pass it
          # as actor-override so the action's inner gate validates against
          # the *PR owner*, not the workflow trigger sender (which on a
          # fork-PR `synchronize` event can be the external pusher).
          actor-override: ${{ needs.ownership.outputs.owner }}

      - name: Submit Gemini review (APPROVE / REQUEST_CHANGES)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { extractVerdict } = require(path.resolve('.vsdd-philosophies/.github/scripts/extract-verdict.js'));
            const raw = fs.readFileSync('review.md', 'utf8');
            const { verdict, body } = extractVerdict(raw);
            if (verdict !== 'pass' && verdict !== 'fail') {
              core.setFailed('Gemini output had no extractable verdict (no frontmatter, no fallback match). Failing the workflow; raw output is preserved in the review body for human triage.');
            }
            const event = verdict === 'pass' ? 'APPROVE' : 'REQUEST_CHANGES';
            const header = `**VSDD Phase 3 — Gemini adversarial review** _(advisory; status check is what gates merge)_  \n_Verdict: \`${verdict ?? 'unparseable'}\`_\n\n`;
            const footer = `\n\n---\n_Automated review per MEMORY.md §II Phase 3._`;
            // Self-review guard — see ci-meta.yml's consensus step
            // for the rationale and the spec annotation about hardcoding.
            const author = context.payload.pull_request?.user?.login;
            if (author === 'github-actions[bot]') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: header + `_(${event} would be rejected: PR author == review actor, posting as comment)_\n\n` + body + footer,
              });
            } else {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event,
                body: header + body + footer,
              });
            }

  claude-review:
    name: Claude adversarial review
    needs: [ownership, prep]
    # Same guard as gemini-review — skip cleanly when ANTHROPIC_API_KEY isn't
    # available rather than fail noisily.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.has-anthropic-key == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: pr-context
          path: ./

      # Fetch philosophies' scripts (extract-verdict.js) for downstream
      # callers that don't have them in their checkout.
      - name: Fetch sw2m/philosophies scripts
        uses: actions/checkout@v6
        with:
          repository: sw2m/philosophies
          ref: main
          path: .vsdd-philosophies

      - name: Run Claude (composite; org-member gate inside)
        uses: sw2m/philosophies/.github/actions/claude@main
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          output-file: review.md
          # Same stdin-file as Gemini — `gemini-stdin.txt` already starts
          # with `${{ env.PHASE_3_PROMPT }}`, followed by MEMORY.md, the PR /
          # linked-issue context, the full repo tree, and pr.diff. Do NOT
          # also pass `prompt: PHASE_3_PROMPT` here — the claude composite
          # concatenates `prompt` + `stdin-file`, so a separate `prompt:`
          # would deliver the system prompt twice. The gemini-review step
          # is the correct shape (stdin-file only).
          stdin-file: gemini-stdin.txt
          actor-override: ${{ needs.ownership.outputs.owner }}

      - name: Submit Claude review (APPROVE / REQUEST_CHANGES)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const { extractVerdict } = require(path.resolve('.vsdd-philosophies/.github/scripts/extract-verdict.js'));
            const raw = fs.readFileSync('review.md', 'utf8');
            const { verdict, body } = extractVerdict(raw);
            if (verdict !== 'pass' && verdict !== 'fail') {
              core.setFailed('Claude output had no extractable verdict (no frontmatter, no fallback match). Failing the workflow; raw output is preserved in the review body for human triage.');
            }
            const event = verdict === 'pass' ? 'APPROVE' : 'REQUEST_CHANGES';
            const header = `**VSDD Phase 3 — Claude adversarial review** _(advisory; status check is what gates merge)_  \n_Verdict: \`${verdict ?? 'unparseable'}\`_\n\n`;
            const footer = `\n\n---\n_Automated review per MEMORY.md §II Phase 3._`;
            // Self-review guard — same as the gemini-review step.
            const author = context.payload.pull_request?.user?.login;
            if (author === 'github-actions[bot]') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: header + `_(${event} would be rejected: PR author == review actor, posting as comment)_\n\n` + body + footer,
              });
            } else {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event,
                body: header + body + footer,
              });
            }
