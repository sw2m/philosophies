name: VSDD Promotion Pipeline

# Assignment-triggered promotion of issues through the VSDD lifecycle.
#
#   - `spec:goal` issue + org-member self-assignment
#       → promote-goal-to-tech: agent decomposes the goal into N tech-spec
#         sub-issues (one technical problem each) and opens them.
#
#   - `spec:tech` issue + org-member self-assignment
#       → promote-tech-to-pr: 5-phase pipeline opens a draft PR
#         (1 scaffold → 2 author tests → 3 Red gate → 4 implement → 5
#         Green gate, with retry loops capped at 3 attempts each).
#
# Ownership gate: the assignment must result in at least one org-member
# assignee on the issue. External or bot-authored issues stay dormant
# until an org member self-assigns. This gives a single uniform HIL gate
# for autonomous-but-supervised work across sw2m repos.

on:
  issues:
    types: [assigned]
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  ownership:
    name: Verify org-member ownership
    runs-on: ubuntu-latest
    outputs:
      owned: ${{ steps.check.outputs.owned }}
      owner: ${{ steps.check.outputs.owner }}
      kind: ${{ steps.classify.outputs.kind }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: sw2m
          ASSIGNEES_JSON: ${{ toJson(github.event.issue.assignees) }}
        shell: bash
        run: |
          set -euo pipefail
          OWNER=""
          for login in $(jq -r '.[].login' <<< "$ASSIGNEES_JSON"); do
            if [ -n "$login" ] && gh api "orgs/$ORG/members/$login" >/dev/null 2>&1; then
              OWNER="$login"
              echo "Owner: $login (assignee, org member)"
              break
            fi
          done
          if [ -n "$OWNER" ]; then
            echo "owned=true"   >> "$GITHUB_OUTPUT"
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          else
            echo "owned=false"  >> "$GITHUB_OUTPUT"
            echo "owner="       >> "$GITHUB_OUTPUT"
            echo "::notice::No org-member assignee. Promotion pipeline skipped."
          fi

      - id: classify
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        shell: bash
        run: |
          set -euo pipefail
          # Pick the FIRST recognized spec label encountered. If both are
          # set (a misconfiguration), prefer `spec:tech` — tech is the
          # narrower, more actionable promotion.
          KIND=""
          if jq -e '.[] | select(.name == "spec:tech")' <<< "$LABELS_JSON" >/dev/null; then
            KIND="tech"
          elif jq -e '.[] | select(.name == "spec:goal")' <<< "$LABELS_JSON" >/dev/null; then
            KIND="goal"
          fi
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          if [ -z "$KIND" ]; then
            echo "::notice::Issue has neither spec:goal nor spec:tech. Promotion pipeline is a no-op."
          else
            echo "Spec kind: $KIND"
          fi

  phase-1c-clearance:
    name: Phase 1c verdict clearance
    needs: [ownership]
    # Only gate when there's actually something to promote. For non-spec
    # issues or unowned ones, skip cleanly.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind != '' }}
    runs-on: ubuntu-latest
    outputs:
      cleared: ${{ steps.check.outputs.cleared }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ github.event.issue.number }}
        shell: bash
        run: |
          set -euo pipefail
          # Per #93: gate verdict freshness against the issue's BODY-EDIT
          # timestamp (`lastEditedAt`), not its `updated_at`. `updated_at`
          # bumps on every field change — assignments, label changes,
          # comment additions — including the very `assigned` event that
          # fires this workflow. That made fresh verdicts always read as
          # stale at validation time (since the assign timestamp post-
          # dates them by definition), producing a structural race that
          # made promotion impossible without admin override. Body edits
          # are the ONLY change that can invalidate Phase 1c verdicts
          # (the verdicts judge body content); gating on `lastEditedAt`
          # gives the right reference. Falls back to `createdAt` when
          # the body has never been edited since the issue opened.
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"
          REF_AT=$(gh api graphql \
            -f query='query($owner: String!, $name: String!, $num: Int!) {
              repository(owner: $owner, name: $name) {
                issue(number: $num) {
                  lastEditedAt
                  createdAt
                }
              }
            }' \
            -f owner="$OWNER" -f name="$NAME" -F num="$ISSUE" \
            --jq '.data.repository.issue.lastEditedAt // .data.repository.issue.createdAt')
          if [ -z "$REF_AT" ] || [ "$REF_AT" = "null" ]; then
            echo "::error::Could not resolve body-edit timestamp for issue #${ISSUE}; refusing to evaluate verdict freshness."
            echo "cleared=false" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          updated_epoch=$(date -d "$REF_AT" +%s)
          echo "Phase 1c verdict-freshness reference: $REF_AT (epoch $updated_epoch); per #93 this is the body-edit timestamp, not updated_at."

          # Find the latest verdict marker per reviewer that
          # github-actions[bot] posted AFTER the issue's last body edit.
          # Both reviewers (gemini, claude) must be present and PASS.
          comments=$(gh api -H "Accept: application/vnd.github+json" \
            "repos/${REPO}/issues/${ISSUE}/comments?per_page=100")

          for reviewer in gemini claude; do
            # Each Phase 1c reviewer comment carries an HTML-comment-
            # wrapped frontmatter block at the very top:
            #   <!-- vsdd-phase-1c
            #   reviewer: gemini
            #   verdict: pass
            #   -->
            # The block is invisible to human readers but parseable here.
            # Pull the latest comment whose frontmatter matches THIS
            # reviewer (so a fresh edit→re-review supersedes the prior
            # verdict for the same reviewer).
            latest=$(jq -r --arg r "$reviewer" '
              [.[]
                | select(.user.login == "github-actions[bot]")
                | select(.body | test("<!-- vsdd-phase-1c[\\s\\S]*reviewer:\\s*" + $r + "[\\s\\S]*-->"))
              ]
              | sort_by(.created_at)
              | last
            ' <<<"$comments")
            if [ "$latest" = "null" ] || [ -z "$latest" ]; then
              echo "::error::No Phase 1c review from ${reviewer} on this issue. Edit the issue body to re-trigger Phase 1c review."
              echo "cleared=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            # Pull the verdict from the frontmatter of the chosen comment.
            verdict=$(jq -r '.body' <<<"$latest" \
              | sed -n 's/^verdict:\s*\(pass\|fail\)\s*$/\1/p' \
              | head -1)
            if [ -z "$verdict" ]; then
              echo "::error::Phase 1c ${reviewer} comment found but verdict frontmatter is missing/unparseable; treating as fail."
              echo "cleared=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            created_at=$(jq -r '.created_at' <<<"$latest")
            created_epoch=$(date -d "$created_at" +%s)
            if [ "$created_epoch" -lt "$updated_epoch" ]; then
              echo "::error::Phase 1c ${reviewer} verdict (${verdict}) is stale — posted at ${created_at}, issue body last edited at ${REF_AT}. Edit the issue body to re-trigger Phase 1c."
              echo "cleared=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            if [ "$verdict" != "pass" ]; then
              echo "::error::Phase 1c ${reviewer} verdict is '${verdict}'. Address the blocking concerns in the review comment, edit the issue, and re-run Phase 1c."
              echo "cleared=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "✓ ${reviewer} verdict pass at ${created_at}"
          done
          # Per #128: in addition to the strict gemini+claude pass
          # requirement above, also check for any orchestrator-emitted
          # `fail` verdict on goal-specs. The orchestrator runs after the
          # named reviewers and posts `fail` for count-validity issues
          # or classification disagreement.
          orch_latest=$(jq -r '
            [.[]
              | select(.user.login == "github-actions[bot]")
              | select(.body | test("<!-- vsdd-phase-1c[\\s\\S]*reviewer:\\s*orchestrator[\\s\\S]*-->"))
            ]
            | sort_by(.created_at)
            | last
          ' <<<"$comments")
          if [ "$orch_latest" != "null" ] && [ -n "$orch_latest" ]; then
            orch_verdict=$(jq -r '.body' <<<"$orch_latest" \
              | sed -n 's/^verdict:\s*\(pass\|fail\)\s*$/\1/p' \
              | head -1)
            orch_created=$(jq -r '.created_at' <<<"$orch_latest")
            orch_epoch=$(date -d "$orch_created" +%s)
            # Only enforce when the orchestrator comment is fresh (not
            # stale relative to the issue's last body edit, per #93).
            if [ "$orch_epoch" -ge "$updated_epoch" ] && [ "$orch_verdict" = "fail" ]; then
              echo "::error::Phase 1c orchestrator verdict is 'fail' at ${orch_created}. See the orchestrator comment for blocking concerns."
              echo "cleared=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
          fi
          echo "cleared=true" >> "$GITHUB_OUTPUT"

  promote-goal-to-tech:
    name: Decompose goal-spec into tech-spec sub-issues
    needs: [ownership, phase-1c-clearance]
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind == 'goal' && needs.phase-1c-clearance.outputs.cleared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run promote-goal-to-tech (composite; org gate inside)
        uses: ./.github/actions/promote/promote-goal-to-tech
        with:
          issue-number: ${{ github.event.issue.number }}
          owner-login: ${{ needs.ownership.outputs.owner }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  promote-tech-to-pr:
    name: Implement tech-spec via 5-phase pipeline
    needs: [ownership, phase-1c-clearance]
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind == 'tech' && needs.phase-1c-clearance.outputs.cleared == 'true' }}
    runs-on: ubuntu-latest
    # Serialize per-issue runs to avoid race on branch creation if the
    # same tech-spec is unassigned and reassigned quickly. `cancel-in-progress`
    # = false: let the in-flight run finish — half-implemented PRs are
    # worse than two ordered runs.
    concurrency:
      group: promote-tech-to-pr-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run promote-tech-to-pr (composite; org gate inside)
        uses: ./.github/actions/promote/promote-tech-to-pr
        with:
          issue-number: ${{ github.event.issue.number }}
          owner-login: ${{ needs.ownership.outputs.owner }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
