name: VSDD Promotion Pipeline

# Assignment-triggered promotion of issues through the VSDD lifecycle.
#
#   - `spec:goal` issue + org-member self-assignment
#       → promote-goal-to-tech: agent decomposes the goal into N tech-spec
#         sub-issues (one technical problem each) and opens them.
#
#   - `spec:tech` issue + org-member self-assignment
#       → promote-tech-to-pr: 5-phase pipeline opens a draft PR
#         (1 scaffold → 2 author tests → 3 Red gate → 4 implement → 5
#         Green gate, with retry loops capped at 3 attempts each).
#
# Ownership gate: the assignment must result in at least one org-member
# assignee on the issue. External or bot-authored issues stay dormant
# until an org member self-assigns. This gives a single uniform HIL gate
# for autonomous-but-supervised work across sw2m repos.

on:
  issues:
    types: [assigned]
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: true
      ANTHROPIC_API_KEY:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  ownership:
    name: Verify org-member ownership
    runs-on: ubuntu-latest
    outputs:
      owned: ${{ steps.check.outputs.owned }}
      owner: ${{ steps.check.outputs.owner }}
      kind: ${{ steps.classify.outputs.kind }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: sw2m
          ASSIGNEES_JSON: ${{ toJson(github.event.issue.assignees) }}
        shell: bash
        run: |
          set -euo pipefail
          OWNER=""
          for login in $(jq -r '.[].login' <<< "$ASSIGNEES_JSON"); do
            if [ -n "$login" ] && gh api "orgs/$ORG/members/$login" >/dev/null 2>&1; then
              OWNER="$login"
              echo "Owner: $login (assignee, org member)"
              break
            fi
          done
          if [ -n "$OWNER" ]; then
            echo "owned=true"   >> "$GITHUB_OUTPUT"
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          else
            echo "owned=false"  >> "$GITHUB_OUTPUT"
            echo "owner="       >> "$GITHUB_OUTPUT"
            echo "::notice::No org-member assignee. Promotion pipeline skipped."
          fi

      - id: classify
        env:
          LABELS_JSON: ${{ toJson(github.event.issue.labels) }}
        shell: bash
        run: |
          set -euo pipefail
          # Pick the FIRST recognized spec label encountered. If both are
          # set (a misconfiguration), prefer `spec:tech` — tech is the
          # narrower, more actionable promotion.
          KIND=""
          if jq -e '.[] | select(.name == "spec:tech")' <<< "$LABELS_JSON" >/dev/null; then
            KIND="tech"
          elif jq -e '.[] | select(.name == "spec:goal")' <<< "$LABELS_JSON" >/dev/null; then
            KIND="goal"
          fi
          echo "kind=$KIND" >> "$GITHUB_OUTPUT"
          if [ -z "$KIND" ]; then
            echo "::notice::Issue has neither spec:goal nor spec:tech. Promotion pipeline is a no-op."
          else
            echo "Spec kind: $KIND"
          fi

  phase-1c-clearance:
    name: Phase 1c verdict clearance
    needs: [ownership]
    # Only gate when there's actually something to promote. For non-spec
    # issues or unowned ones, skip cleanly.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind != '' }}
    runs-on: ubuntu-latest
    outputs:
      cleared: ${{ steps.check.outputs.cleared }}
    steps:
      - id: check
        uses: ./.github/actions/script/github-deno
        with:
          script: |
            // Phase 1c clearance — both gemini AND claude must have a
            // fresh `pass` verdict on the issue, AND the orchestrator
            // must not have a fresh `fail` verdict. "Fresh" means the
            // verdict comment was posted AFTER the issue's last body
            // edit (per #93 — body edit is the only thing that
            // invalidates a verdict).
            const cardinality = await import("./.github/scripts/vsdd/phase-1c/cardinality.ts");
            const [owner, name] = "${{ github.repository }}".split("/");
            const issue = ${{ github.event.issue.number }};

            // Reference timestamp for freshness (per #93).
            const q = await github.graphql(
              `query($owner: String!, $name: String!, $num: Int!) {
                repository(owner: $owner, name: $name) {
                  issue(number: $num) {
                    lastEditedAt
                    createdAt
                  }
                }
              }`,
              { owner, name, num: issue },
            );
            const refAt = q.repository?.issue?.lastEditedAt || q.repository?.issue?.createdAt;
            if (!refAt) {
              core.setFailed(`Could not resolve body-edit timestamp for issue #${issue}; refusing to evaluate verdict freshness.`);
              await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
              return;
            }
            const refEpoch = Math.floor(new Date(refAt).getTime() / 1000);
            console.log(`Phase 1c verdict-freshness reference: ${refAt} (epoch ${refEpoch}); per #93 this is the body-edit timestamp.`);

            // Pull all comments and find latest per reviewer.
            const allComments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo: name, issue_number: issue, per_page: 100 },
            );
            const bot = allComments.filter((c) => c.user?.login === "github-actions[bot]");

            // Find the latest comment whose vsdd-phase-1c block matches
            // `slug`. Returns the comment's verdict + creation epoch, or
            // null when no matching comment exists.
            function latest(slug) {
              let hit = null;
              for (const c of bot) {
                const r = cardinality.read(c.body || "", slug);
                if (!r) continue;
                if (!hit || new Date(c.created_at) > new Date(hit.c.created_at)) {
                  hit = { c, r };
                }
              }
              if (!hit) return null;
              return {
                verdict: hit.r.verdict,
                created: hit.c.created_at,
                epoch: Math.floor(new Date(hit.c.created_at).getTime() / 1000),
              };
            }

            // Both gemini and claude must be present, fresh, and pass.
            for (const slug of ["gemini", "claude"]) {
              const v = latest(slug);
              if (!v) {
                core.setFailed(`No Phase 1c review from ${slug} on this issue. Edit the issue body to re-trigger Phase 1c review.`);
                await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
                return;
              }
              if (!v.verdict) {
                core.setFailed(`Phase 1c ${slug} comment found but verdict frontmatter is missing/unparseable; treating as fail.`);
                await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
                return;
              }
              if (v.epoch < refEpoch) {
                core.setFailed(`Phase 1c ${slug} verdict (${v.verdict}) is stale — posted at ${v.created}, issue body last edited at ${refAt}. Edit the issue body to re-trigger Phase 1c.`);
                await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
                return;
              }
              if (v.verdict !== "pass") {
                core.setFailed(`Phase 1c ${slug} verdict is '${v.verdict}'. Address the blocking concerns in the review comment, edit the issue, and re-run Phase 1c.`);
                await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
                return;
              }
              console.log(`✓ ${slug} verdict pass at ${v.created}`);
            }

            // Per #128: also check for any fresh orchestrator-emitted
            // fail verdict on goal-specs.
            const orch = latest("orchestrator");
            if (orch && orch.epoch >= refEpoch && orch.verdict === "fail") {
              core.setFailed(`Phase 1c orchestrator verdict is 'fail' at ${orch.created}. See the orchestrator comment for blocking concerns.`);
              await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=false\n", { append: true });
              return;
            }

            await Deno.writeTextFile(Deno.env.get("GITHUB_OUTPUT")!, "cleared=true\n", { append: true });

  promote-goal-to-tech:
    name: Decompose goal-spec into tech-spec sub-issues
    needs: [ownership, phase-1c-clearance]
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind == 'goal' && needs.phase-1c-clearance.outputs.cleared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run promote-goal-to-tech (composite; org gate inside)
        uses: ./.github/actions/promote/promote-goal-to-tech
        with:
          issue-number: ${{ github.event.issue.number }}
          owner-login: ${{ needs.ownership.outputs.owner }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  promote-tech-to-pr:
    name: Implement tech-spec via 5-phase pipeline
    needs: [ownership, phase-1c-clearance]
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.kind == 'tech' && needs.phase-1c-clearance.outputs.cleared == 'true' }}
    runs-on: ubuntu-latest
    # Serialize per-issue runs to avoid race on branch creation if the
    # same tech-spec is unassigned and reassigned quickly. `cancel-in-progress`
    # = false: let the in-flight run finish — half-implemented PRs are
    # worse than two ordered runs.
    concurrency:
      group: promote-tech-to-pr-${{ github.event.issue.number }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run promote-tech-to-pr (composite; org gate inside)
        uses: ./.github/actions/promote/promote-tech-to-pr
        with:
          issue-number: ${{ github.event.issue.number }}
          owner-login: ${{ needs.ownership.outputs.owner }}
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
