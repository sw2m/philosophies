name: VSDD marker presence check

# Reusable workflow per #129. Consumers (e.g., vsdd-brand.yml) call this
# via workflow_call to discover whether an earned `Red-gate-cleared` marker
# is present on a PR. Output is purely informational; this workflow always
# exits 0 — no merge blocking.

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number to check for marker presence."
        required: true
        type: number
    outputs:
      marker-present:
        description: "true if any github-actions[bot] comment on this PR contains the marker token; false otherwise."
        value: ${{ jobs.check.outputs.marker-present }}

permissions:
  pull-requests: read
  issues: read

jobs:
  check:
    name: Scan PR comments for marker token
    runs-on: ubuntu-latest
    outputs:
      marker-present: ${{ steps.scan.outputs.marker-present }}
    steps:
      - uses: actions/checkout@v6

      - name: Scan via gh api --paginate + JS hasMarkerToken (SIGPIPE short-circuit)
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ inputs.pr-number }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -uo pipefail
          # Per #129: paginated comment fetch with first-match short-
          # circuit, routing token-detection through vsdd-brand.js's
          # `hasMarkerToken` so the workflow and the pure module stay
          # in step. `gh api --paginate --jq '.[] | {...}'` streams
          # one comment-summary JSON per line; node reads line-by-line,
          # calls `hasMarkerToken`, exits on first match — process exit
          # closes stdin upstream, SIGPIPE-ing `gh api`, which stops
          # paginating subsequent pages.
          set +e
          result=$(
            gh api --paginate "repos/${REPO}/issues/${PR}/comments" \
                --jq '.[] | {login: .user.login, body: .body}' 2>/dev/null \
              | node -e '
                const {hasMarkerToken} = require("./.github/scripts/vsdd-brand.js");
                const rl = require("readline").createInterface({input: process.stdin});
                let answered = false;
                rl.on("line", (line) => {
                  if (answered || !line) return;
                  try {
                    const c = JSON.parse(line);
                    if (c.login === "github-actions[bot]" && hasMarkerToken(c.body)) {
                      answered = true;
                      process.stdout.write("found");
                      process.exit(0);
                    }
                  } catch {}
                });
                rl.on("close", () => {
                  if (!answered) process.stdout.write("absent");
                });
              '
          )
          rc=$?
          set -e
          # Treat any non-zero from the pipeline (other than the
          # intentional SIGPIPE-on-match) as "fail closed".
          if [ "$rc" != "0" ] && [ "$result" != "found" ]; then
            echo "::warning::comment scan pipeline exited non-zero ($rc); failing-closed (marker-present=false)."
            echo "marker-present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$result" = "found" ]; then
            echo "marker-present=true" >> "$GITHUB_OUTPUT"
            echo "Marker present on PR #${PR}."
          else
            echo "marker-present=false" >> "$GITHUB_OUTPUT"
            echo "No marker present on PR #${PR}."
          fi
