name: VSDD marker presence check

# Reusable workflow per #129. Consumers (e.g., vsdd-brand.yml) call this
# via workflow_call to discover whether an earned `Red-gate-cleared` marker
# is present on a PR. Output is purely informational; this workflow always
# exits 0 — no merge blocking.

on:
  workflow_call:
    inputs:
      pr-number:
        description: "PR number to check for marker presence."
        required: true
        type: number
    outputs:
      marker-present:
        description: "true if any github-actions[bot] comment on this PR contains the marker token; false otherwise."
        value: ${{ jobs.check.outputs.marker-present }}

permissions:
  pull-requests: read
  issues: read

jobs:
  check:
    name: Scan PR comments for marker token
    runs-on: ubuntu-latest
    outputs:
      marker-present: ${{ steps.scan.outputs.marker-present }}
    steps:
      - uses: actions/checkout@v6

      - name: Scan PR comments via brand.ts
        id: scan
        uses: ./.github/actions/script/github-deno
        with:
          result-encoding: string
          script: |
            // Paginated comment fetch with first-match short-circuit,
            // routing token-detection through vsdd/brand.ts so the
            // workflow and the pure module share one predicate. On
            // rate-limit: one 30s backoff retry, then fail-closed
            // (marker-present=false).
            const { marked } = await import("./.github/scripts/vsdd/brand.ts");
            const pr = ${{ inputs.pr-number }};
            const [owner, repo] = "${{ github.repository }}".split("/");

            async function scan() {
              const it = github.paginate.iterator(
                github.rest.issues.listComments,
                { owner, repo, issue_number: pr, per_page: 100 },
              );
              for await (const { data } of it) {
                for (const c of data) {
                  if (c.user?.login === "github-actions[bot]" && marked(c.body || "")) {
                    return "found";
                  }
                }
              }
              return "absent";
            }

            let result;
            try {
              result = await scan();
            } catch (e) {
              const status = (e as { status?: number })?.status;
              if (status === 403) {
                core.notice("API rate-limited; retrying once after 30s backoff.");
                await new Promise((r) => setTimeout(r, 30_000));
                try {
                  result = await scan();
                } catch (e2) {
                  const status2 = (e2 as { status?: number })?.status;
                  if (status2 === 403) {
                    core.notice("Rate-limited twice; failing-closed (marker-present=false).");
                    await Deno.writeTextFile(
                      Deno.env.get("GITHUB_OUTPUT")!,
                      "marker-present=false\n",
                      { append: true },
                    );
                    return "absent";
                  }
                  throw e2;
                }
              } else {
                throw e;
              }
            }

            const present = result === "found" ? "true" : "false";
            await Deno.writeTextFile(
              Deno.env.get("GITHUB_OUTPUT")!,
              `marker-present=${present}\n`,
              { append: true },
            );
            return result;
