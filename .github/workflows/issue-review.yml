name: VSDD Issue Review (Phase 1c)

# Advisory adversarial review of new/edited issues. Two adversarial reviewers
# run in parallel for cognitive diversity (MEMORY.md §V): Gemini and Claude.
# Each posts its findings as an issue comment. Org membership is enforced
# inside the composite actions — non-members trigger a hard fail of the agent
# step.

on:
  issues:
    # `assigned` so externally-authored or bot-authored issues become
    # eligible for Phase 1c review when an org member self-assigns.
    types: [opened, edited, assigned]
  workflow_call:
    secrets:
      GEMINI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false

permissions:
  issues: write
  contents: read

jobs:
  ownership:
    name: Verify org-member ownership
    runs-on: ubuntu-latest
    outputs:
      owned: ${{ steps.check.outputs.owned }}
      owner: ${{ steps.check.outputs.owner }}
      has-gemini-key: ${{ steps.keys.outputs.has-gemini-key }}
      has-anthropic-key: ${{ steps.keys.outputs.has-anthropic-key }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
          ORG: sw2m
          AUTHOR: ${{ github.event.issue.user.login }}
          ASSIGNEES_JSON: ${{ toJson(github.event.issue.assignees) }}
        shell: bash
        run: |
          set -euo pipefail
          check_member() {
            local login="$1"
            [ -n "$login" ] && gh api "orgs/$ORG/members/$login" >/dev/null 2>&1
          }
          OWNER=""
          if check_member "$AUTHOR"; then
            OWNER="$AUTHOR"
            echo "Owner: $AUTHOR (issue author, org member)"
          else
            for login in $(jq -r '.[].login' <<< "$ASSIGNEES_JSON"); do
              if check_member "$login"; then
                OWNER="$login"
                echo "Owner: $login (assignee, org member)"
                break
              fi
            done
          fi
          if [ -n "$OWNER" ]; then
            echo "owned=true"  >> "$GITHUB_OUTPUT"
            echo "owner=$OWNER" >> "$GITHUB_OUTPUT"
          else
            echo "owned=false" >> "$GITHUB_OUTPUT"
            echo "owner="      >> "$GITHUB_OUTPUT"
            echo "::notice::Issue not owned: author '$AUTHOR' is not an sw2m org member and no assignee is. Phase 1c review skipped. To enable, an org member must self-assign."
          fi
      - id: keys
        # `secrets` is allowed in step env but NOT in job-level `if:`. Surface
        # presence as a job output so reviewer jobs can gate via `needs.*`.
        # (See pr-review.yml for the registration-failure history that
        # forced this restructuring.)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        shell: bash
        run: |
          [ -n "${GEMINI_API_KEY:-}" ]    && echo "has-gemini-key=true"    >> "$GITHUB_OUTPUT" || echo "has-gemini-key=false"    >> "$GITHUB_OUTPUT"
          [ -n "${ANTHROPIC_API_KEY:-}" ] && echo "has-anthropic-key=true" >> "$GITHUB_OUTPUT" || echo "has-anthropic-key=false" >> "$GITHUB_OUTPUT"

  prep:
    name: Build Phase 1c prompt
    needs: [ownership]
    if: ${{ needs.ownership.outputs.owned == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Fetch philosophies for the canonical MEMORY.md fallback when the
      # consumer doesn't have one of their own.
      - name: Fetch sw2m/philosophies (canonical MEMORY.md)
        uses: actions/checkout@v6
        with:
          repository: sw2m/philosophies
          ref: main
          path: .vsdd-philosophies

      - name: Detect spec:goal label
        id: label-check
        env:
          LABELS_JSON: ${{ toJSON(github.event.issue.labels) }}
        shell: bash
        run: |
          set -euo pipefail
          # `is-goal-spec=true` only when the issue carries the spec:goal
          # label. Per #128: the cardinality counting directive is injected
          # only for goal-specs; tech-spec reviews are unaffected.
          is_goal=$(jq -r 'any(.name == "spec:goal")' <<<"$LABELS_JSON")
          echo "is-goal-spec=$is_goal" >> "$GITHUB_OUTPUT"

      - name: Build prompt
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          IS_GOAL_SPEC: ${{ steps.label-check.outputs.is-goal-spec }}
        run: |
          cat > stdin.txt <<'PROMPT_EOF'
          You are Sarcasmotron, the adversarial reviewer described in MEMORY.md
          (Verified Spec-Driven Development). You are running Phase 1c (Spec
          Review Gate) on a freshly-filed or freshly-edited GitHub issue.

          Read MEMORY.md (provided below) for VSDD context, then review the
          issue body below. Look ONLY for:
            - Ambiguous wording that could be interpreted multiple ways
            - Missing edge cases (null, empty, max size, negative, unicode,
              concurrent, etc.)
            - Implicit assumptions that are not stated
            - Contradictions between different parts of the issue
            - Properties claimed as "testable only" that should be provable
            - Purity-boundary violations
            - Verification-tool mismatches
            - Spec discipline violations (§VII), both sides of the rule:
              * Tech-spec issue: does it cover exactly ONE discrete
                technical problem? Bundled tech specs (multiple
                technical problems in one issue body) violate §VII.
              * Goal-spec issue: does it stay focused on goals (WHAT
                must be true) without leaking technical / implementation
                content (HOW)? Goal specs may have many goals (that's
                fine, do not flag breadth), but they must not include
                solution design — that belongs in tech specs.

          Output rules:
            - Be terse. Bullet points only. No preamble.
            - Each bullet: a concrete flaw with a specific quote/location and
              a proposed fix or clarifying question. Lead each blocking
              concern with the literal token `(blocking)`; advisory nits
              do not need a marker.
            - If genuinely no concerns: output exactly "No Phase 1c concerns identified."
            - End your output with EXACTLY one verdict line, on its own
              line, in this format (no other text on the line):
                _Verdict: `pass`_     (no blocking concerns)
                _Verdict: `fail`_     (one or more `(blocking)` concerns)
              The verdict line gates promotion of this issue: the CI
              extracts it into a structured frontmatter block at the
              top of your posted comment, and `promote.yml`'s
              `phase-1c-clearance` job blocks goal→tech / tech→PR if
              EITHER reviewer's latest verdict is `fail` or stale (older
              than the issue's last edit). Edit the issue body to
              re-run Phase 1c.

          --- MEMORY.md ---
          PROMPT_EOF
          # Prefer the consumer's own MEMORY.md if it exists; fall back
          # to philosophies' canonical copy fetched above.
          if [ -f MEMORY.md ]; then
            cat MEMORY.md >> stdin.txt
          else
            cat .vsdd-philosophies/MEMORY.md >> stdin.txt
          fi
          # Per #128: append cardinality count-reporting directive only
          # when reviewing a spec:goal issue. Tech-spec reviews are
          # unaffected.
          if [ "$IS_GOAL_SPEC" = "true" ]; then
            cat >> stdin.txt <<'CARDINALITY_EOF'

          --- CARDINALITY DIRECTIVE (goal-specs only) ---

          In addition to the bullet-list output above, you MUST report your
          parsed cardinality counts at the very END of your output, on two
          lines of their own (no other content), in this exact format:

              subjects: <integer>
              outcomes: <integer>

          Where:
            - `subjects` = count of discrete noun phrases the goal text
              names as targets of change.
            - `outcomes` = count of discrete verb phrases the goal text
              names in its acceptance criteria.

          Both counts MUST be integers ≥ 1. A count of 0 indicates the
          goal text is malformed (missing subjects or acceptance criteria);
          report 0 if that is genuinely the case. Negative numbers,
          decimals, or non-numeric tokens are treated as 0.

          The counts are read by an orchestrator step that compares yours
          to the other reviewer's. If the two reviewers disagree on
          classification (`min(subjects, outcomes) == 1` vs `min ≥ 2`),
          the orchestrator posts a blocking concern requiring goal-text
          clarification.
          CARDINALITY_EOF
          fi
          {
            printf '\n--- ISSUE TITLE ---\n%s\n' "$ISSUE_TITLE"
            printf '\n--- ISSUE BODY ---\n%s\n' "$ISSUE_BODY"
          } >> stdin.txt

      - uses: actions/upload-artifact@v7
        with:
          name: issue-context
          path: |
            stdin.txt

  gemini-review:
    name: Gemini VSDD Phase 1c review
    needs: [ownership, prep]
    # Skip cleanly when GEMINI_API_KEY isn't available rather than fail
    # noisily — the workflow is advisory and must not gate anything.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.has-gemini-key == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: issue-context
          path: ./

      - name: Run Gemini (composite action; org-member gate enforced inside)
        uses: ./.github/actions/agents/gemini
        with:
          api-key: ${{ secrets.GEMINI_API_KEY }}
          stdin-file: stdin.txt
          output-file: review.md
          actor-override: ${{ needs.ownership.outputs.owner }}

      - name: Post review with budget-decay reclassification (gemini)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const budget = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/phase-1c-budget.js',
            ));
            const REVIEWER = 'gemini';
            const reviewBody = fs.readFileSync('review.md', 'utf8');
            // Round counting: paginate through all issue comments, count
            // prior frontmatter comments authored by this reviewer.
            const allComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );
            const round = budget.computeRound(allComments, REVIEWER);
            const budgetN = budget.computeBudget(round);
            const result = budget.processReview({
              body: reviewBody,
              round,
              budget: budgetN,
            });
            // Per #128: extract subjects/outcomes counts from the LLM
            // output for goal-specs and add them to the frontmatter so
            // the orchestrator step can read them.
            const cardinality = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/phase-1c-cardinality.js',
            ));
            const issueLabels = (context.payload.issue?.labels || [])
              .map((l) => (typeof l === 'string' ? l : l.name));
            const isGoalSpec = issueLabels.includes('spec:goal');
            let countLines = '';
            if (isGoalSpec) {
              const tuple = cardinality.parseCountTuple(reviewBody);
              if (tuple) {
                countLines =
                  `subjects: ${tuple.subjects}\n` +
                  `outcomes: ${tuple.outcomes}\n`;
              } else {
                countLines = `subjects: 0\noutcomes: 0\n`;
              }
            }
            const frontmatter =
              `<!-- vsdd-phase-1c\n` +
              `reviewer: ${REVIEWER}\n` +
              `verdict: ${result.verdict}\n` +
              countLines +
              `-->\n\n`;
            const header = `**VSDD Phase 1c — Gemini**\n\n`;
            const footer = `\n\n---\n_Automated review per MEMORY.md §II Phase 1c. Verdict gates promotion._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: frontmatter + header + result.body + footer,
            });

  claude-review:
    name: Claude VSDD Phase 1c review
    needs: [ownership, prep]
    # Same guard as gemini-review — skip cleanly when ANTHROPIC_API_KEY isn't
    # available rather than fail noisily.
    if: ${{ needs.ownership.outputs.owned == 'true' && needs.ownership.outputs.has-anthropic-key == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: issue-context
          path: ./

      - name: Run Claude (composite action; org-member gate enforced inside)
        uses: ./.github/actions/agents/claude
        with:
          api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          stdin-file: stdin.txt
          output-file: review.md
          actor-override: ${{ needs.ownership.outputs.owner }}

      - name: Post review with budget-decay reclassification (claude)
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const budget = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/phase-1c-budget.js',
            ));
            const REVIEWER = 'claude';
            const reviewBody = fs.readFileSync('review.md', 'utf8');
            const allComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );
            const round = budget.computeRound(allComments, REVIEWER);
            const budgetN = budget.computeBudget(round);
            const result = budget.processReview({
              body: reviewBody,
              round,
              budget: budgetN,
            });
            // Per #128: extract subjects/outcomes counts from the LLM
            // output for goal-specs and add them to the frontmatter so
            // the orchestrator step can read them.
            const cardinality = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/phase-1c-cardinality.js',
            ));
            const issueLabels = (context.payload.issue?.labels || [])
              .map((l) => (typeof l === 'string' ? l : l.name));
            const isGoalSpec = issueLabels.includes('spec:goal');
            let countLines = '';
            if (isGoalSpec) {
              const tuple = cardinality.parseCountTuple(reviewBody);
              if (tuple) {
                countLines =
                  `subjects: ${tuple.subjects}\n` +
                  `outcomes: ${tuple.outcomes}\n`;
              } else {
                countLines = `subjects: 0\noutcomes: 0\n`;
              }
            }
            const frontmatter =
              `<!-- vsdd-phase-1c\n` +
              `reviewer: ${REVIEWER}\n` +
              `verdict: ${result.verdict}\n` +
              countLines +
              `-->\n\n`;
            const header = `**VSDD Phase 1c — Claude**\n\n`;
            const footer = `\n\n---\n_Automated review per MEMORY.md §II Phase 1c. Verdict gates promotion._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: frontmatter + header + result.body + footer,
            });

  orchestrator:
    name: Cardinality orchestrator (goal-specs)
    needs: [ownership, gemini-review, claude-review]
    # Only run when the issue is a spec:goal AND ownership succeeded.
    # No-op for tech-specs and any other issue type — absent count
    # frontmatter on tech-spec reviews never triggers validation.
    if: ${{ needs.ownership.outputs.owned == 'true' && contains(toJSON(github.event.issue.labels), 'spec:goal') }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Read tuples + post orchestrator verdict
        uses: actions/github-script@v9
        with:
          script: |
            const path = require('path');
            const cardinality = require(path.join(
              process.env.GITHUB_WORKSPACE,
              '.github/scripts/phase-1c-cardinality.js',
            ));

            const allComments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
              },
            );

            const tuples = cardinality.extractReviewerTuples(allComments);
            const concerns = [];
            let canonical = null;

            // Validation: zero/missing counts on either reviewer.
            if (!tuples.gemini) {
              concerns.push(
                "(blocking) Gemini's most-recent review is missing or has " +
                "invalid `subjects`/`outcomes` counts (treated as 0). The " +
                "goal text may be missing subjects or acceptance criteria; " +
                "edit the goal body and re-run Phase 1c.",
              );
            }
            if (!tuples.claude) {
              concerns.push(
                "(blocking) Claude's most-recent review is missing or has " +
                "invalid `subjects`/`outcomes` counts (treated as 0). The " +
                "goal text may be missing subjects or acceptance criteria; " +
                "edit the goal body and re-run Phase 1c.",
              );
            }

            if (tuples.gemini && tuples.claude) {
              const gMin = cardinality.computeClassification(tuples.gemini);
              const cMin = cardinality.computeClassification(tuples.claude);
              if (gMin.isSingleTechSpec !== cMin.isSingleTechSpec) {
                concerns.push(
                  `(blocking) Reviewers disagree on classification: ` +
                  `gemini reports ${JSON.stringify(tuples.gemini)} ` +
                  `(min=${gMin.min}, ` +
                  `${gMin.isSingleTechSpec ? 'atomic' : 'decomposable'}); ` +
                  `claude reports ${JSON.stringify(tuples.claude)} ` +
                  `(min=${cMin.min}, ` +
                  `${cMin.isSingleTechSpec ? 'atomic' : 'decomposable'}). ` +
                  `Edit the goal body to clarify until both reviewers ` +
                  `read the same shape.`,
                );
              } else {
                // Agreement on classification — compute canonical tuple
                // (per-axis MIN; preserves agreed classification).
                canonical = cardinality.perAxisMin(tuples.gemini, tuples.claude);
              }
            }

            const verdict = concerns.length === 0 ? 'pass' : 'fail';
            const fm = cardinality.buildOrchestratorFrontmatter({
              verdict,
              ...(canonical || {}),
            });
            const header = `**VSDD Phase 1c — Orchestrator (cardinality)**\n\n`;
            let body;
            if (concerns.length === 0) {
              const tupleStr = canonical
                ? `subjects=${canonical.subjects}, outcomes=${canonical.outcomes}, min=${Math.min(canonical.subjects, canonical.outcomes)}`
                : '(no canonical tuple — check orchestrator state)';
              body = `Reviewer counts agreed on classification. Canonical tuple: ${tupleStr}.`;
            } else {
              body = concerns.map((c) => `- ${c}`).join('\n');
            }
            const footer = `\n\n---\n_Per #128: cardinality orchestrator. Verdict gates promotion when fail; canonical tuple consumed by promote-goal-to-tech._`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: fm + '\n\n' + header + body + footer,
            });
